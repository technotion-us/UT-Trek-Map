<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SF Trek Travel Atlas</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }

.mapboxgl-popup {
    max-width:720px;
    font-family: system-ui;
}

.popup-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
}

.popup-people {
    font-style: italic;
    font-size: 13px;
    margin-bottom: 6px;
}

.popup-field {
    font-size: 13px;
    margin-bottom: 6px;
}

.popup-summary {
    font-size: 13px;
    margin-bottom: 6px;
}

.popup-takeaways {
    font-size: 13px;
    margin-bottom: 8px;
}

.carousel {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    border-radius: 8px;
}

.carousel img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: none;
}

.carousel img.active {
    display: block;
}

.carousel-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
}

button {
    background: #222;
    color: white;
    border: none;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
}

.tooltip {
    background: black;
    color: white;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 4px;
}

.trek-marker {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4ade80;
    cursor: pointer;
    position: relative;
}

.trek-marker::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(74, 222, 128, 0.55);
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
    pointer-events: none;
}

.trek-marker.is-active::after {
    animation: markerPulse 1.7s ease-out infinite;
}

@keyframes markerPulse {
    0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.5;
    }
    100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div id="map"></div>
<script src="config.js"></script>
<script>

mapboxgl.accessToken = "pk.eyJ1IjoidGVjaG5vdGlvbmFsIiwiYSI6ImNtbjI1MGFqNjEwdjUycXB6eWJuZGh3aHkifQ.j0_U1kXl51FyaGcjn4oAew";

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-122.4194, 37.7749],
    zoom: 11
});

async function loadLocations() {
    const response = await fetch('testing.json');
    if (!response.ok) {
        throw new Error(`Failed to load stops json: ${response.status}`);
    }

    const data = await response.json();
    const stops = data.stops;

    if (Array.isArray(stops)) {
        return stops.filter((stop) => stop && Array.isArray(stop.coords) && stop.coords.length === 2);
    }

    if (stops && typeof stops === 'object') {
        return Object.keys(stops)
            .sort((a, b) => Number(a) - Number(b))
            .map((stopKey) => stops[stopKey])
            .filter((stop) => stop && Array.isArray(stop.coords) && stop.coords.length === 2);
    }

    return [];
}

function createCarousel(images = []) {
    const resolvedImages = images
        .map((img) => resolveImagePath(img))
        .filter((img) => Boolean(img));

    if (!resolvedImages.length) {
        return "";
    }

    let imgHTML = resolvedImages.map((img, i) =>
        `<img src="${img}" class="${i===0?'active':''}" loading="lazy" onerror="this.remove()">`
    ).join("");

    return `
        <div class="carousel">
            ${imgHTML}
        </div>
        <div class="carousel-buttons">
            <button onclick="prevImage(this)">◀</button>
            <button onclick="nextImage(this)">▶</button>
        </div>
    `;
}

const SHAREOUT_IMAGE_FILES = [
    'bri01.JPG',
    'bri02.JPG',
    'bri03.JPG',
    'bri04.JPG',
    'bri05.JPG',
    'bri06.JPG',
    'bryan01.jpg',
    'bryan02.jpg',
    'bryan03.jpg',
    'bryan04.jpg',
    'bryan05.jpg',
    'bryan06.jpg',
    'bryan07.jpg',
    'bryan08.jpg',
    'bryan09.jpg',
    'bryan10.jpg',
    'bryan11.jpg',
    'bryan12.jpg',
    'bryan13.jpg',
    'bryan14.jpg',
    'bryan15.jpg',
    'bryan16.jpg',
    'bryan17.jpg',
    'charlie01.jpg',
    'jack00_COVER.jpg',
    'jack01.jpg',
    'jack03.jpg',
    'jack04.jpg',
    'jack05.jpg'
];

const SHAREOUT_IMAGE_LOOKUP = SHAREOUT_IMAGE_FILES.reduce((lookup, fileName) => {
    lookup[fileName.toLowerCase()] = fileName;
    return lookup;
}, {});

function resolveImagePath(imageKey) {
    if (!imageKey || typeof imageKey !== 'string') {
        return null;
    }

    const cleanKey = imageKey.trim();
    if (!cleanKey) {
        return null;
    }

    if (/^https?:\/\//i.test(cleanKey)) {
        return cleanKey;
    }

    const baseName = cleanKey.split('/').pop();
    if (!baseName) {
        return null;
    }

    const candidates = [
        baseName,
        `${baseName}.jpg`,
        `${baseName}.jpeg`,
        `${baseName}.png`,
        `${baseName}.webp`,
        `${baseName}.gif`
    ];

    let matchedFile = null;
    for (const candidate of candidates) {
        const file = SHAREOUT_IMAGE_LOOKUP[candidate.toLowerCase()];
        if (file) {
            matchedFile = file;
            break;
        }
    }

    if (!matchedFile) {
        console.warn('Image key from testing.json did not match a file in Shareout Pics:', imageKey);
        return null;
    }

    return `Shareout Pics/${encodeURIComponent(matchedFile)}`;
}

function stripHtml(value = '') {
    const temp = document.createElement('div');
    temp.innerHTML = value;
    return temp.textContent || temp.innerText || '';
}

function distanceMeters(coordsA, coordsB) {
    const [lon1, lat1] = coordsA;
    const [lon2, lat2] = coordsB;
    const toRad = Math.PI / 180;
    const dLat = (lat2 - lat1) * toRad;
    const dLon = (lon2 - lon1) * toRad;
    const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.sin(dLon / 2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return 6371000 * c;
}

function offsetCoordsByMeters(coords, eastMeters, northMeters) {
    const [lon, lat] = coords;
    const latRadians = lat * (Math.PI / 180);
    const dLat = northMeters / 111320;
    const dLon = eastMeters / (111320 * Math.max(Math.cos(latRadians), 0.00001));
    return [lon + dLon, lat + dLat];
}

function spreadOverlappingLocations(locations) {
    const overlapThresholdMeters = 90;
    const spreadRadiusMeters = 35;

    const enhanced = locations.map((loc) => ({
        ...loc,
        displayCoords: [Number(loc.coords[0]), Number(loc.coords[1])]
    }));

    const visited = new Set();

    for (let i = 0; i < enhanced.length; i += 1) {
        if (visited.has(i)) {
            continue;
        }

        const queue = [i];
        const group = [];
        visited.add(i);

        while (queue.length) {
            const current = queue.shift();
            group.push(current);

            for (let j = 0; j < enhanced.length; j += 1) {
                if (visited.has(j)) {
                    continue;
                }

                if (distanceMeters(enhanced[current].coords, enhanced[j].coords) <= overlapThresholdMeters) {
                    visited.add(j);
                    queue.push(j);
                }
            }
        }

        if (group.length > 1) {
            group.forEach((index, position) => {
                const angle = (2 * Math.PI * position) / group.length;
                const east = Math.cos(angle) * spreadRadiusMeters;
                const north = Math.sin(angle) * spreadRadiusMeters;
                enhanced[index].displayCoords = offsetCoordsByMeters(enhanced[index].coords, east, north);
            });
        }
    }

    return enhanced;
}

const STOPS_SOURCE_ID = 'trek-stops';
const STOPS_LAYER_ID = 'trek-stops-layer';
const STOPS_PULSE_LAYER_ID = 'trek-stops-pulse-layer';

function getSectorColorExpression() {
    return [
        'match',
        ['get', 'sector'],
        'private', '#ff4fa3',
        'public', '#3b82f6',
        'non-profit', '#a855f7',
        '#4ade80'
    ];
}

function getSectorHaloColorExpression() {
    return [
        'match',
        ['get', 'sector'],
        'private', 'rgba(255, 79, 163, 0.45)',
        'public', 'rgba(59, 130, 246, 0.45)',
        'non-profit', 'rgba(168, 85, 247, 0.45)',
        'rgba(74, 222, 128, 0.45)'
    ];
}

function startPulseAnimation() {
    const baseRadius = 11;
    const amplitude = 5;
    const speed = 0.0042;

    function animate(timestamp) {
        if (!map.getLayer(STOPS_PULSE_LAYER_ID)) {
            return;
        }

        const wave = (Math.sin(timestamp * speed) + 1) / 2;
        const pulseRadius = baseRadius + (wave * amplitude);
        const pulseOpacity = 0.6 - (wave * 0.35);

        map.setPaintProperty(STOPS_PULSE_LAYER_ID, 'circle-radius', [
            'case',
            ['boolean', ['feature-state', 'active'], false],
            pulseRadius,
            0
        ]);
        map.setPaintProperty(STOPS_PULSE_LAYER_ID, 'circle-opacity', [
            'case',
            ['boolean', ['feature-state', 'active'], false],
            pulseOpacity,
            0
        ]);

        requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
}

function addLocationsToMap(locations) {
    const preparedLocations = spreadOverlappingLocations(locations);

    const features = preparedLocations.map((loc, index) => ({
        type: 'Feature',
        id: index,
        geometry: {
            type: 'Point',
            coordinates: [Number(loc.displayCoords[0]), Number(loc.displayCoords[1])]
        },
        properties: {
            title: loc.title || '',
            people: loc.people || '',
            field: loc.field || '',
            summary: loc.summary || '',
            takeaways: loc.takeaways || '',
            images: JSON.stringify(loc.images || []),
            sector: (loc.sector || '').trim().toLowerCase()
        }
    }));

    map.addSource(STOPS_SOURCE_ID, {
        type: 'geojson',
        data: {
            type: 'FeatureCollection',
            features
        }
    });

    map.addLayer({
        id: STOPS_LAYER_ID,
        type: 'circle',
        source: STOPS_SOURCE_ID,
        paint: {
            'circle-radius': [
                'case',
                ['boolean', ['feature-state', 'active'], false],
                9,
                7
            ],
            'circle-color': getSectorColorExpression(),
            'circle-stroke-width': [
                'case',
                ['boolean', ['feature-state', 'active'], false],
                3,
                2
            ],
            'circle-stroke-color': getSectorHaloColorExpression()
        }
    });

    map.addLayer({
        id: STOPS_PULSE_LAYER_ID,
        type: 'circle',
        source: STOPS_SOURCE_ID,
        paint: {
            'circle-color': getSectorColorExpression(),
            'circle-radius': 0,
            'circle-opacity': 0
        }
    });

    startPulseAnimation();

    const hoverPopup = new mapboxgl.Popup({
        closeButton: false,
        closeOnClick: false,
        offset: 15
    });
    const detailPopup = new mapboxgl.Popup({ offset: 25 });
    let activeStopId = null;

    map.on('mouseenter', STOPS_LAYER_ID, (e) => {
        map.getCanvas().style.cursor = 'pointer';
        const feature = e.features && e.features[0];
        if (!feature) {
            return;
        }

        hoverPopup
            .setLngLat(feature.geometry.coordinates)
            .setText(stripHtml(feature.properties.title || ''))
            .addTo(map);
    });

    map.on('mouseleave', STOPS_LAYER_ID, () => {
        map.getCanvas().style.cursor = '';
        hoverPopup.remove();
    });

    map.on('click', STOPS_LAYER_ID, (e) => {
        const feature = e.features && e.features[0];
        if (!feature) {
            return;
        }

        hoverPopup.remove();

        if (activeStopId !== null) {
            map.setFeatureState({ source: STOPS_SOURCE_ID, id: activeStopId }, { active: false });
        }

        activeStopId = feature.id;
        map.setFeatureState({ source: STOPS_SOURCE_ID, id: activeStopId }, { active: true });

        let images = [];
        try {
            images = JSON.parse(feature.properties.images || '[]');
        } catch (error) {
            images = [];
        }

        const popupHTML = `
            <div class="popup-title">${feature.properties.title}</div>
            <div class="popup-people">${feature.properties.people}</div>
            <div class="popup-field">${feature.properties.field}</div>
            <div class="popup-summary">${feature.properties.summary}</div>
            <div class="popup-takeaways">${feature.properties.takeaways}</div>
            ${createCarousel(images)}
        `;

        detailPopup
            .setLngLat(feature.geometry.coordinates)
            .setHTML(popupHTML)
            .addTo(map);
    });

    detailPopup.on('close', () => {
        if (activeStopId !== null) {
            map.setFeatureState({ source: STOPS_SOURCE_ID, id: activeStopId }, { active: false });
            activeStopId = null;
        }
    });
}

map.on('load', () => {
    loadLocations()
        .then(addLocationsToMap)
        .catch((error) => {
            console.error('Unable to load stops for map markers:', error);
        });
});

function nextImage(btn) {
    const imgs = btn.parentElement.previousElementSibling.querySelectorAll("img");
    if (imgs.length < 2) {
        return;
    }

    let activeIndex = [...imgs].findIndex(i => i.classList.contains("active"));
    if (activeIndex === -1) {
        activeIndex = 0;
        imgs[0].classList.add("active");
    }

    imgs[activeIndex].classList.remove("active");
    imgs[(activeIndex + 1) % imgs.length].classList.add("active");
}

function prevImage(btn) {
    const imgs = btn.parentElement.previousElementSibling.querySelectorAll("img");
    if (imgs.length < 2) {
        return;
    }

    let activeIndex = [...imgs].findIndex(i => i.classList.contains("active"));
    if (activeIndex === -1) {
        activeIndex = 0;
        imgs[0].classList.add("active");
    }

    imgs[activeIndex].classList.remove("active");
    imgs[(activeIndex - 1 + imgs.length) % imgs.length].classList.add("active");
}

</script>

</body>
</html>
