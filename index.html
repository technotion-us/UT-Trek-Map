<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SF Trek Travel Atlas</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.2.0/mapbox-gl.js"></script>

<style>
body { margin:0; padding:0; }
#map { position:absolute; top:0; bottom:0; width:100%; }

.mapboxgl-popup {
    max-width: 320px;
    font-family: system-ui;
}

.popup-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
}

.popup-people {
    font-style: italic;
    margin-bottom: 6px;
}

.popup-takeaways {
    font-size: 14px;
    margin-bottom: 8px;
}

.carousel {
    position: relative;
    width: 100%;
    height: 180px;
    overflow: hidden;
    border-radius: 8px;
}

.carousel img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: none;
}

.carousel img.active {
    display: block;
}

.carousel-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
}

button {
    background: #222;
    color: white;
    border: none;
    padding: 4px 8px;
    cursor: pointer;
    border-radius: 4px;
}

.tooltip {
    background: black;
    color: white;
    padding: 4px 6px;
    font-size: 12px;
    border-radius: 4px;
}

.trek-marker {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #4ade80;
    cursor: pointer;
    position: relative;
}

.trek-marker::after {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid rgba(74, 222, 128, 0.55);
    transform: translate(-50%, -50%) scale(1);
    opacity: 0;
    pointer-events: none;
}

.trek-marker.is-active::after {
    animation: markerPulse 1.7s ease-out infinite;
}

@keyframes markerPulse {
    0% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 0.5;
    }
    100% {
        transform: translate(-50%, -50%) scale(2.2);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div id="map"></div>
<script src="config.js"></script>
<script>

mapboxgl.accessToken = "pk.eyJ1IjoidGVjaG5vdGlvbmFsIiwiYSI6ImNtbjI1MGFqNjEwdjUycXB6eWJuZGh3aHkifQ.j0_U1kXl51FyaGcjn4oAew";

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [-122.4194, 37.7749],
    zoom: 11
});

async function loadLocations() {
    const response = await fetch('stops.json');
    if (!response.ok) {
        throw new Error(`Failed to load stops.json: ${response.status}`);
    }

    const data = await response.json();
    const stops = data.stops;

    if (Array.isArray(stops)) {
        return stops.filter((stop) => stop && Array.isArray(stop.coords) && stop.coords.length === 2);
    }

    if (stops && typeof stops === 'object') {
        return Object.keys(stops)
            .sort((a, b) => Number(a) - Number(b))
            .map((stopKey) => stops[stopKey])
            .filter((stop) => stop && Array.isArray(stop.coords) && stop.coords.length === 2);
    }

    return [];
}

function createCarousel(images = []) {
    if (!images.length) {
        return "";
    }

    let imgHTML = images.map((img, i) =>
        `<img src="${img}" class="${i===0?'active':''}">`
    ).join("");

    return `
        <div class="carousel">
            ${imgHTML}
        </div>
        <div class="carousel-buttons">
            <button onclick="prevImage(this)">◀</button>
            <button onclick="nextImage(this)">▶</button>
        </div>
    `;
}

function addLocationsToMap(locations) {
let activeMarkerEl = null;

locations.forEach(loc => {

    const el = document.createElement('div');
    el.className = 'trek-marker';

    const popupHTML = `
        <div class="popup-title">${loc.title}</div>
        <div class="popup-people">${loc.people}</div>
        <div class="popup-takeaways">${loc.takeaways}</div>
        ${createCarousel(loc.images || [])}
    `;

    const popup = new mapboxgl.Popup({ offset: 25 })
        .setHTML(popupHTML);

    popup.on('open', () => {
        if (activeMarkerEl && activeMarkerEl !== el) {
            activeMarkerEl.classList.remove('is-active');
        }

        el.classList.add('is-active');
        activeMarkerEl = el;
    });

    popup.on('close', () => {
        el.classList.remove('is-active');
        if (activeMarkerEl === el) {
            activeMarkerEl = null;
        }
    });

    const marker = new mapboxgl.Marker(el)
        .setLngLat(loc.coords)
        .setPopup(popup)
        .addTo(map);

    const tooltip = new mapboxgl.Popup({
        closeButton: false,
        closeOnClick: false,
        offset: 15
    }).setText(loc.title);

    el.addEventListener('mouseenter', () => {
        tooltip.setLngLat(loc.coords).addTo(map);
    });

    el.addEventListener('mouseleave', () => {
        tooltip.remove();
    });

    el.addEventListener('click', () => {
        tooltip.remove();
    });

});
}

loadLocations()
    .then(addLocationsToMap)
    .catch((error) => {
        console.error('Unable to load stops for map markers:', error);
    });

function nextImage(btn) {
    const imgs = btn.parentElement.previousElementSibling.querySelectorAll("img");
    let activeIndex = [...imgs].findIndex(i => i.classList.contains("active"));

    imgs[activeIndex].classList.remove("active");
    imgs[(activeIndex + 1) % imgs.length].classList.add("active");
}

function prevImage(btn) {
    const imgs = btn.parentElement.previousElementSibling.querySelectorAll("img");
    let activeIndex = [...imgs].findIndex(i => i.classList.contains("active"));

    imgs[activeIndex].classList.remove("active");
    imgs[(activeIndex - 1 + imgs.length) % imgs.length].classList.add("active");
}

</script>

</body>
</html>
